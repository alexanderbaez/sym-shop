<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Producto - SyM Shop</title>
    
    <link rel="icon" type="image/png" href="../images/LOGOSYM1.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <link rel="stylesheet" href="../css/index.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        /* Estilos rápidos estilo Mercado Libre para la galería y talles */
        .img-miniatura {
            width: 70px;
            height: 70px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid #e0e0e0;
            transition: all 0.2s;
        }
        .img-miniatura:hover, .img-miniatura.activa {
            border-color: #7b2cbf;
        }
        .btn-talle-caja {
            min-width: 45px;
            height: 45px;
            border: 1px solid #cccccc;
            background: white;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-talle-caja.seleccionado {
            border-color: #7b2cbf;
            background-color: #7b2cbf;
            color: white;
        }
    </style>
</head>
<body>

<header>
        <nav class="navbar navbar-expand-lg fixed-top shadow-sm" id="mainNav" style="background: #ffffff; border-bottom: 1px solid #eee;">
            <div class="container">
                <button class="navbar-toggler border-0 ps-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <i class="fas fa-bars fa-lg" style="color: #7b2cbf;"></i>
                </button>
                    <div class="d-flex align-items-center mx-auto mx-lg-0" style="cursor: pointer;" onclick="window.location.href='../index.html';">
                        <img src="../images/LOGOSYM1.png" alt="SyM Logo" style="height: 45px !important; width: auto !important;" class="me-2">
                        <span class="fw-bold" style="letter-spacing: 1px; font-size: 1.3rem; color: #7b2cbf; font-family: 'Montserrat', sans-serif;">SyM Shop</span>
                    </div>

                <div class="d-flex align-items-center order-lg-last">
                    <a class="nav-link position-relative px-2" href="#" id="cartIcon" data-bs-toggle="modal" data-bs-target="#cartModal" style="color: #7b2cbf;">
                        <i class="fas fa-shopping-bag fa-lg"></i>
                        <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.6rem; display: none;">0</span>
                    </a>
                </div>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto fw-medium text-center" style="font-size: 0.9rem;">
                        <li class="nav-item">
                            <a class="nav-link px-3" href="../index.html" style="color: #240046;">INICIO</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle px-3" href="#" id="navbarDropdownRopa" role="button" data-bs-toggle="dropdown" aria-expanded="false" style="color: #240046;">
                                ROPA
                            </a>
                            <ul class="dropdown-menu border-0 shadow-sm text-center text-lg-start" aria-labelledby="navbarDropdownRopa" style="background: #ffffff; border-radius: 8px;">
                                <li><a class="dropdown-item py-2" href="../index.html?cat=mujer" style="font-size: 0.85rem; color: #240046;">Colección Mujer</a></li>
                                <li><a class="dropdown-item py-2" href="../index.html?cat=hombre" style="font-size: 0.85rem; color: #240046;">Colección Hombre</a></li>
                                <li><a class="dropdown-item py-2" href="../index.html?cat=ninos" style="font-size: 0.85rem; color: #240046;">Línea Infantil</a></li>
                            </ul>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-3" href="../index.html?cat=regaleria" style="color: #240046;">REGALERÍA</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

<main class="py-5" style="margin-top: 80px;">
        <div class="container">
            <div class="mb-4">
                <a href="../index.html" class="text-decoration-none text-uppercase fw-bold" style="color: #7b2cbf; font-size: 0.85rem;">
                    <i class="fas fa-chevron-left me-1"></i> Volver al catálogo
                </a>
            </div>

            <div class="row g-4">
                <div class="col-md-6">
                    <div class="text-center mb-3">
                        <img id="det-imagen-principal" src="" class="img-fluid rounded shadow-sm" alt="Cargando producto..." style="max-height: 500px; object-fit: contain;">
                    </div>
                    <div id="det-galeria-miniaturas" class="d-flex justify-content-center gap-2 flex-wrap"></div>
                </div>
                
                <div class="col-md-6">
                    <span id="det-etiqueta" class="badge bg-danger mb-2" style="display: none; background-color: #ff4d4d !important;"></span>
                    
                    <h1 id="det-nombre" class="fw-bold mb-2">Cargando...</h1>
                    
                    <div class="mb-3">
                        <span class="text-muted text-uppercase" style="font-size: 0.75rem; letter-spacing: 1px;">Precio Lista:</span>
                        <div id="det-precio-minorista" class="h3 fw-bold m-0">$0</div>
                    </div>
                    
                    <hr>

                    <div class="mb-3">
                        <span class="text-muted text-uppercase" style="font-size: 0.75rem; letter-spacing: 1px;">Descripción</span>
                        <p id="det-descripcion" class="text-muted mt-1"></p>
                    </div>
                    
                    <div id="contenedor-talles" class="mb-4" style="display: none;">
                        <label class="form-label fw-bold text-muted text-uppercase" style="font-size: 0.75rem; letter-spacing: 1px;">Talle:</label>
                        <div id="det-talles-opciones" class="d-flex gap-2 flex-wrap"></div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted text-uppercase" style="font-size: 0.75rem; letter-spacing: 1px;">Cantidad</label>
                        <div class="input-group" style="width: 120px;">
                            <button class="btn btn-outline-secondary" type="button" onclick="cambiarCantidadDetalle(-1)">-</button>
                            <input type="text" id="det-cantidad-input" class="form-control text-center fw-bold" value="1" readonly>
                            <button class="btn btn-outline-secondary" type="button" onclick="cambiarCantidadDetalle(1)">+</button>
                        </div>
                    </div>
                    
                    <button id="det-btn-agregar" class="btn text-white w-100 py-3 mt-2 fw-bold text-uppercase" style="background-color: #7b2cbf; border-color: #7b2cbf; border-radius: 8px;">
                        <i class="fas fa-shopping-bag me-2"></i> Añadir al carrito
                    </button>
                </div>
            </div>

            <div class="row mt-5 pt-4 border-top">
                <div class="col-12 mb-4">
                    <h4 class="fw-bold" style="color: #240046;">Quienes vieron este producto también compraron</h4>
                </div>
                <div id="contenedor-similares" class="row row-cols-2 row-cols-md-4 g-3"></div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="cartModal" tabindex="-1" aria-labelledby="cartModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-md">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 16px; overflow: hidden;">
                <div class="modal-header border-0 text-white" style="background: #7b2cbf;">
                    <h5 class="modal-title text-uppercase fw-bold" id="cartModalLabel" style="letter-spacing: 1px; font-size: 0.85rem;">
                        <i class="fas fa-shopping-bag me-2"></i> Mi Carrito
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-3" id="cart-items"></div>
                <div class="px-3 pb-2 bg-white">
                    <div class="d-flex justify-content-between align-items-center mb-1" style="font-size: 0.7rem;">
                        <span id="ux-progress-text" class="text-muted">Añadiendo artículos a la bolsa...</span>
                        <span id="ux-progress-percent" class="fw-bold text-dark">0/3</span>
                    </div>
                    <div class="progress" style="height: 6px; border-radius: 10px; background-color: #eee;">
                        <div id="ux-progress-bar-fill" class="progress-bar progress-bar-striped progress-bar-animated bg-dark" role="progressbar" style="width: 0%;"></div>
                    </div>
                </div>
                <div class="modal-footer border-0 bg-light p-3 d-flex flex-column" id="cart-total"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/productos.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
